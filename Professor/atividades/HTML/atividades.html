<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstudeX | Professor - Criar Atividade</title>

    <!-- CSS -->

<link rel="stylesheet" href="../../../global/CSS/theme.css">
<link rel="stylesheet" href="../../perfil/CSS/professorSidebar.css">
<link rel="stylesheet" href="../CSS/atividadeProfessor.css">

    <!-- Fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Orbitron:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">



</head>

<body>

    <section class="user-dashboard">
        <!-- SIDEBAR (Menu Lateral) - VERSÃO PROFESSOR -->
        <div class="sidebar professor-sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-bars menu-icon" id="menu-toggle"></i>
                <span class="logo-text">EstudeX <span class="professor-badge">Prof</span></span>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li><a href="../../perfil/HTML/professorPerfil.html" class="nav-item"><i class="fas fa-user"></i>
                            <span>Perfil</span></a></li>
                    <li><a href="../../atividades/HTML/atividades.html" class="nav-item"><i class="fas fa-tasks"></i>
                            <span>Atividades</span></a></li>
                    <li><a href="../../redacao/HTML/criarRedacao.html" class="nav-item"><i class="fas fa-pen-fancy"></i> 
                        <span>Redações</span></a></li>
                    <li><a href="../../comunicados_professor/HTML/professorComunicados.html" class="nav-item"><i
                                class="fas fa-bullhorn"></i> <span>Comunicados</span></a></li>
                    <li><a href="../../atividades/HTML/duvidas.html" class="nav-item"><i
                                class="fas fa-question-circle"></i> <span>Dúvidas</span></a></li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <a href="../../../Login/HTML/login.html" class="nav-item" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Sair</span>
                </a>
            </div>


        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <div class="atividade-container">

                <!-- Cabeçalho da página -->
                <div class="atividade-card header-card">
                    <h1 class="page-title">
                        <i class="fas fa-plus-circle"></i> Criar Nova Atividade
                    </h1>
                    <p class="page-subtitle">
                        Preencha os dados abaixo para criar uma atividade para seus alunos
                    </p>
                </div>

                <!-- Card Principal - Criar Atividade -->
                <div class="atividade-card create-card">

                    <!-- Informações Básicas da Atividade -->
                    <div class="form-section">
                        <h2 class="section-title">
                            <i class="fas fa-info-circle"></i> Informações Básicas
                        </h2>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="tipoAtividade"><i class="fas fa-tag"></i> Tipo de Atividade *</label>
                                <select id="tipoAtividade" class="form-control" required>
                                    <option value="">Selecione o tipo de atividade</option>
                                    <option value="questao">❓ Questão</option>
                                    <option value="simulado">📊 Simulado</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="dificuldade"><i class="fas fa-chart-line"></i> Dificuldade</label>
                                <select id="dificuldadeQuestao" class="form-control">
                                    <option value="">Carregando dificuldades...</option>
                                </select>
                            </div>


                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="serie"><i class="fas fa-users"></i> Turma *</label>
                                <select id="serie" class="form-control" required>
                                    <option value="">Carregando turmas...</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="disciplina"><i class="fas fa-book"></i> Disciplina *</label>
                                <select id="disciplina" class="form-control" required>
                                    <option value="">Selecione a disciplina</option>
                                    <option value="matematica">Matemática</option>
                                    <option value="portugues">Português</option>
                                    <option value="historia">História</option>
                                    <option value="geografia">Geografia</option>
                                    <option value="ciencias">Ciências</option>
                                    <option value="fisica">Física</option>
                                    <option value="quimica">Química</option>
                                    <option value="biologia">Biologia</option>
                                    <option value="ingles">Inglês</option>
                                    <option value="redacao">Redação</option>
                                </select>
                            </div>
                        </div>
                    </div>



                    <!-- Botões de Ação -->
                    <div class="form-actions">
                        <button type="button" id="btnConsultarAtividade" class="btn-primary"
                            onclick="window.location.href='minhasAtividades.html'">
                            <i class="fas fa-tasks"></i> Minhas Atividades
                        </button>
                        <button type="button" id="btnSalvarAtividade" class="btn-primary">
                            <i class="fas fa-save"></i> Criar Atividade
                        </button>

                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Modal Material de Apoio -->
    <div id="modalMaterial" class="modal-overlay" style="display:none;">
        <div class="modal-card">
            <h2 class="modal-title">
                <i class="fas fa-paperclip"></i> Material de Apoio
            </h2>
            <p class="modal-subtitle">Deseja anexar um material de apoio para esta atividade?</p>

            <div id="uploadArea" style="display:none;" class="upload-area">
                <input type="file" id="inputArquivo" accept=".pdf" style="display:none;">
                <label for="inputArquivo" class="upload-label">
                    <i class="fas fa-file-pdf"></i>
                    <span id="uploadTexto">Clique para selecionar um PDF</span>
                </label>
            </div>

            <div class="modal-actions">
                <button id="btnSimMaterial" class="btn-primary">
                    <i class="fas fa-check"></i> Sim, anexar
                </button>
                <button id="btnNaoMaterial" class="btn-secondary">
                    <i class="fas fa-times"></i> Não, continuar
                </button>
            </div>
        </div>
    </div>

    <script src="../JS/atividadeProfessor.js"></script>
    <script src="../../perfil/JS/menuSideBar.js"></script>
    <script src="../../../global/JS/theme.js"></script>



</body>

</html>
