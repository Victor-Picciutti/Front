<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstudeX · Perfil do Professor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../CSS/professorTurma.css">
    <link rel="stylesheet" href="../CSS/professorSidebar.css">
     <link rel="stylesheet" href="../../../global/CSS/theme.css">

</head>

<body>
    <div class="user-dashboard">
        <!-- SIDEBAR -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-bars menu-icon" id="menu-toggle"></i>
                <span class="logo-text">EstudeX <span class="professor-badge">Prof</span></span>
            </div>

            <nav class="sidebar-nav">
                <ul>
                    <li><a href="../../perfil/HTML/professorPerfil.html" class="nav-item active"><i class="fas fa-user"></i> <span>Perfil</span></a></li>
                    <li><a href="../../atividades/HTML/atividades.html" class="nav-item"><i class="fas fa-tasks"></i> <span>Atividades</span></a></li>
                    <li><a href="../../redacao/HTML/criarRedacao.html" class="nav-item"><i class="fas fa-pen-fancy"></i> <span>Redações</span></a></li>
                    <li><a href="../../comunicados_professor/HTML/professorComunicados.html" class="nav-item"><i class="fas fa-bullhorn"></i> <span>Comunicados</span></a></li>
                    <li><a href="../../atividades/HTML/duvidas.html" class="nav-item"><i class="fas fa-question-circle"></i> <span>Dúvidas</span></a></li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <a href="../../../Login/HTML/login.html" class="nav-item logout" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Sair</span>
                </a>
            </div>
        </div>

        <!-- CONTEÚDO PRINCIPAL -->
        <main class="dashboard-content">
            <!-- HEADER DO PERFIL -->
            <header class="profile-header" id="profileHeader">
                <div class="loading-spinner">
                    <i class="fas fa-spinner fa-spin"></i> Carregando perfil...
                </div>
            </header>

            <!-- SELOS E CONQUISTAS -->
            <section class="selos-section" id="selosSection">
                <div class="section-header">
                    <h3><i class="fas fa-medal"></i> Selos e conquistas</h3>
                    <span class="ver-todas" id="verTodosSelos">Ver todas →</span>
                </div>
                <div class="selos-container" id="selosContainer">
                    <div class="loading-spinner small">
                        <i class="fas fa-spinner fa-spin"></i>
                    </div>
                </div>
            </section>

            <!-- TURMAS -->
            <section class="turmas-section">
                <h3><i class="fas fa-users-between-lines"></i> Minhas Turmas</h3>
                <div class="turmas-grid" id="turmasGrid">
                    <div class="loading-spinner">
                        <i class="fas fa-spinner fa-spin"></i> Carregando turmas...
                    </div>
                </div>
            </section>

            <!-- LISTA DE ALUNOS (inicialmente oculta) -->
            <section class="alunos-section" id="alunosSection" style="display: none;">
                <div class="section-header">
                    <h3 id="turmaTitulo"><i class="fas fa-user-graduate"></i> Alunos da Turma</h3>
                    <button class="btn-fechar" id="fecharAlunos">
                        <i class="fas fa-times"></i> fechar
                    </button>
                </div>
                <div class="alunos-container" id="alunosContainer"></div>
            </section>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal" id="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle"></h3>
                <span class="modal-close" id="modalClose">&times;</span>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

<script src="../JS/professorTurma.js"></script>
<script src="../JS/menuSideBar.js"></script>
<script src="../../../global/JS/theme.js"></script>

</body>

</html>
