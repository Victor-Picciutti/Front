<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EstudeX - Login Futurista</title>
    <link rel="stylesheet" href="../CSS/login.css">
      <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body> 
        <!-- Botões de acesso rápido (dev) -->
<div class="dev-buttons">
    <a href="../../Home/HTML/home-Estudex.html" class="btn-dev aluno">
        Aluno
    </a>

    <a href="../../Professor/perfil/HTML/professorPerfil.html" class="btn-dev professor">
        Professor
    </a>
</div>
  
    <div class="login-container">
        <!-- Fundo com Partículas Animadas -->
        <div class="particles-bg">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>

        <!-- Conteúdo Principal -->
        <div class="login-content">
            
            <!-- Seção do Mascote -->
            <div class="mascot-section">
                <div class="mascot-container">
                    <video class="mascot-video" autoplay muted loop>
                         <source src="../../img/videologin.mp4" type="video/mp4">
                        
                    </video>
                </div>
                <div class="mascot-message">
                    <p class="welcome-text">Bem-vindo de volta ao <span class="brand-name">EstudeX</span></p>
                    <p class="subtitle-text">Sua plataforma de aprendizado inteligente</p>
                </div>
            </div>

            <!-- Seção do Formulário -->
            <div class="form-section">
                <div class="form-card">
                    <h1 class="form-title">
                        <i class="fas fa-sign-in-alt"></i> Entrar
                    </h1>
                    <p class="form-subtitle">Acesse sua conta e continue estudando</p>

                    <form class="login-form" id="login-form">
                        <!-- Campo de Email -->
                        <div class="form-group">
                            <label for="email" class="form-label">
                                <i class="fas fa-envelope"></i> E-mail
                            </label>
                            <input 
                                type="email" 
                                id="email" 
                                class="form-input" 
                                placeholder="seu@email.com"
                                required
                            >
                            <div class="input-focus-line"></div>
                        </div>

                        <!-- Campo de Senha -->
                        <div class="form-group">
                            <label for="password" class="form-label">
                                <i class="fas fa-lock"></i> Senha
                            </label>
                            <div class="password-input-wrapper">
                                <input 
                                    type="password" 
                                    id="password" 
                                    class="form-input" 
                                    placeholder="••••••••"
                                    required
                                >
                                <button type="button" class="toggle-password" id="toggle-password">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                            <div class="input-focus-line"></div>
                        </div>

                        <!-- Lembrar-me e Esqueceu Senha -->
                        <div class="form-options">
                            <label class="remember-me">
                                <input type="checkbox" id="remember">
                                <span>Lembrar-me</span>
                            </label>
                            <a href="#" class="forgot-password">Esqueceu a senha?</a>
                        </div>

                        <!-- Botão de Login -->
                        <button type="submit" class="btn-login">
                            <span class="btn-text">ENTRAR</span>
                            <span class="btn-icon"><i class="fas fa-arrow-right"></i></span>
                        </button>
                    </form>

                    <!-- Divisor -->
                    <div class="divider">
                        <span>ou</span>
                    </div>

                    <!-- Botões de Login Social -->
                    <div class="social-login">
                        <button class="btn-social google" title="Entrar com Google">
                            <i class="fab fa-google"></i>
                        </button>
                        <button class="btn-social github" title="Entrar com GitHub">
                            <i class="fab fa-github"></i>
                        </button>
                        <button class="btn-social microsoft" title="Entrar com Microsoft">
                            <i class="fab fa-microsoft"></i>
                        </button>
                    </div>

                </div>
            </div>

        </div>

        <!-- Notificação de Carregamento -->
        <div class="loading-notification" id="loading-notification">
            <div class="spinner"></div>
            <p>Conectando...</p>
        </div>

    </div>

    <!-- Scripts -->
    <script src="js/login.js"></script>
</body>
</html>
